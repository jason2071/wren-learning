relationships:
  - name: order_customers
    models:
      - orders
      - customers
    join_type: MANY_TO_ONE
    condition: orders.customer_id = customers.customer_id

  - name: item_orders
    models:
      - order_items
      - orders
    join_type: MANY_TO_ONE
    condition: order_items.order_id = orders.order_id

  - name: item_products
    models:
      - order_items
      - products
    join_type: MANY_TO_ONE
    condition: order_items.product_id = products.product_id

version: 1
pairs:
  - nl: "ลูกค้ามีกี่คน"
    sql: "SELECT COUNT(*) FROM customers"
  - nl: "revenue รวมเท่าไร"
    sql: "SELECT SUM(total) FROM orders WHERE status = 2"
  - nl: "ลูกค้า active 90 วันมีกี่คน"
    sql: "SELECT COUNT(DISTINCT customer_id) FROM orders WHERE status = 2 AND paid_at >= now() - interval '90 days'"
  - nl: "ยอดขายรายเดือน"
    sql: "SELECT date_trunc('month', paid_at) AS month, SUM(total) AS revenue FROM orders WHERE status = 2 GROUP BY 1 ORDER BY 1"
  - nl: "มีคนสมัครสมาชิกวันนี้กี่คน"
    sql: "SELECT COUNT(*) FROM customers WHERE created_at::date = current_date"
  - nl: "ใครสมัครล่าสุด"
    sql: "SELECT customer_id, first_name, last_name, created_at FROM customers ORDER BY created_at DESC LIMIT 1"
  - nl: "สินค้ามีกี่ตัว"
    sql: "SELECT COUNT(*) FROM products"
  - nl: "สินค้าที่ยังขายอยู่มีกี่ตัว"
    sql: "SELECT COUNT(*) FROM products WHERE is_active = true"
  - nl: "สินค้าขายดี top 5 ตามจำนวน"
    sql: "SELECT p.name, SUM(oi.quantity) AS qty FROM order_items oi JOIN products p ON p.product_id = oi.product_id JOIN orders o ON o.order_id = oi.order_id WHERE o.status = 2 GROUP BY p.name ORDER BY qty DESC LIMIT 5"
  - nl: "revenue รายสินค้า top 5"
    sql: "SELECT p.name, SUM(oi.quantity * oi.unit_price) AS revenue FROM order_items oi JOIN products p ON p.product_id = oi.product_id JOIN orders o ON o.order_id = oi.order_id WHERE o.status = 2 GROUP BY p.name ORDER BY revenue DESC LIMIT 5"
  - nl: "revenue รายหมวดสินค้า"
    sql: "SELECT p.category_code, SUM(oi.quantity * oi.unit_price) AS revenue FROM order_items oi JOIN products p ON p.product_id = oi.product_id JOIN orders o ON o.order_id = oi.order_id WHERE o.status = 2 GROUP BY p.category_code ORDER BY revenue DESC"
  - nl: "สินค้าแต่ละชิ้นขายได้กี่ออเดอร์"
    sql: "SELECT p.name, COUNT(DISTINCT oi.order_id) AS orders FROM order_items oi JOIN products p ON p.product_id = oi.product_id GROUP BY p.name ORDER BY orders DESC"